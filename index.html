<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Interactive Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="video-container">

  <video
    id="loopPlayer"
    autoplay
    muted
    playsinline
    preload="auto">
    <source src="loop.mp4" type="video/mp4">
  </video>

  <video
    id="finishPlayer"
    muted
    playsinline
    preload="auto">
    <source src="finish.mp4" type="video/mp4">
  </video>

</div>

<button id="finishBtn">
  Finish
</button>

<script src="script.js"></script>
</body>
</html>
